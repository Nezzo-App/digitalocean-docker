<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | Nezzo</title>
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-content h1 { font-size: 8rem; margin: 0; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .error-content h2 { font-size: 2rem; margin: 1rem 0; }
        .error-content p { color: var(--text-secondary); margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>Seite nicht gefunden</h2>
            <p>Die gesuchte Seite existiert leider nicht.</p>
            <a href="/" class="btn btn-primary">Zurück zur Startseite</a>
        </div>
    </div>
</body>
</html>
