version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nezzo-network
    restart: unless-stopped

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../src:/app/src
      - ../package.json:/app/package.json
    command: npm start
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GROK_API_KEY=${GROK_API_KEY}
    networks:
      - nezzo-network
    restart: unless-stopped

networks:
  nezzo-network:
    driver: bridge
